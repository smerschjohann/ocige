version: 2
project_name: ocige

before:
  hooks:
    - go mod tidy

builds:
  - id: ocige
    main: ./cmd/ocige
    binary: ocige
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -extldflags "-static"
    flags:
      - -trimpath

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

dockers_v2:
  - ids:
      - ocige
    images:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/ocige"
    tags:
      - "{{.Tag}}"
      - latest
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.description: "Quantum-secure file exchange via OCI registries with Age encryption"
      org.opencontainers.image.source: "{{.GitURL}}"
      org.opencontainers.image.version: "{{.Version}}"
      org.opencontainers.image.licenses: "MIT"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
